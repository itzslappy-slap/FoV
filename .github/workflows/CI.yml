name: CI Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Install Gradle (if missing)
        run: |
          if ! command -v gradle >/dev/null 2>&1; then
            GRADLE_VERSION=8.6
            wget https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -O gradle.zip
            sudo unzip -q gradle.zip -d /opt/
            echo "/opt/gradle-${GRADLE_VERSION}/bin" | sudo tee -a /etc/environment
            source /etc/environment || true
            export PATH="/opt/gradle-${GRADLE_VERSION}/bin:$PATH"
          fi

      - name: Build
        run: gradle build --no-daemon

      - name: Upload mod JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
